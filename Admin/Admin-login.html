<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins', sans-serif;
    }

    body{
        background:#0b0f19;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .login-box{
        background:#111827;
        padding:40px;
        border-radius:12px;
        width:350px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.6);
        border:1px solid rgba(255,255,255,0.08);
    }

    h1{
        margin-bottom:25px;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border-radius:8px;
        border:1px solid #1f2937;
        background:#0b0f19;
        color:white;
        font-size:14px;
    }

    input:focus{
        outline:none;
        border-color:#f4b400;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:10px;
        background:#f4b400;
        border:none;
        border-radius:8px;
        font-size:16px;
        font-weight:600;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#e0a800;
        transform:translateY(-2px);
    }

    #msg{
        margin-top:15px;
        font-size:14px;
    }
</style>

</head>

<body>

<div class="login-box">

    <h1>Admin Login</h1>

    <form onsubmit="adminLogin(event)">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p id="msg"></p>

</div>

<script src="./Admin-login.js"></script>

</body>
</html>
